---
# Build a custom EE when the platform default lacks Azure/AWS SDK dependencies.
# See docs/setup.md for ansible-builder instructions.
#
# ee-supported-rhel9 is used as base because it ships pip and pyyaml out of the
# box. azure.azcollection and amazon.aws require both during the build: pip for
# the assemble step and pyyaml for the introspect step. ee-minimal-rhel9 lacks
# both and would need manual prepend_builder/prepend_base workarounds.
version: 3

build_arg_defaults:
  ANSIBLE_GALAXY_CLI_COLLECTION_OPTS: "-v"

images:
  base_image:
    name: registry.redhat.io/ansible-automation-platform-27/ee-supported-rhel9:latest

# Both ee-minimal-rhel9 and ee-supported-rhel9 use microdnf, not dnf.
# Without this override the assemble script calls /usr/bin/dnf and fails.
options:
  package_manager_path: /usr/bin/microdnf

dependencies:
  galaxy: requirements.yml

# Project-root ansible.cfg (Automation Hub token) is required before build.
additional_build_files:
  - src: ../ansible.cfg
    dest: configs

additional_build_steps:
  prepend_galaxy:
    # Use the same Hub server_list and token as local collection installs.
    - COPY _build/configs/ansible.cfg /etc/ansible/ansible.cfg
  prepend_builder:
    # systemd-python and dbus-python (transitive deps of azure.azcollection)
    # require C headers not declared in the collection's bindep.txt.
    # ee-supported-rhel9 ships Python 3.12; python3.12-devel provides the
    # matching Python.h under /usr/include/python3.12.
    # PyYAML is required by ansible-builder's introspect.py (step 3/4) to read
    # collection Python requirements. In EE spec v3 the builder stage runs inside
    # the base image; on AAP 2.7 / Python 3.12 pyyaml is not pre-installed there.
    # $PYCMD in the builder stage resolves to /usr/bin/python3 (Python 3.9,
    # RHEL9 system default), not python3.12. ansible-builder's introspect.py
    # requires pyyaml and packaging from that same interpreter.
    # python3-pip is needed to install any remaining introspect deps via pip.
    - RUN microdnf install -y systemd-devel dbus-devel glib2-devel python3.12-devel python3-pyyaml python3-packaging python3-pip && microdnf clean all
  append_final:
    # Do not ship ansible.cfg in the final image (may contain tokens).
    - RUN rm -f /etc/ansible/ansible.cfg
