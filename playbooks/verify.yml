# Description: Smoke-test playbook for local validation (syntax and module wiring).
# Does not create or destroy any resources; checks required variables and
# collection imports. Run this after copying demo_variables.yml.example to
# demo_variables.yml and filling in all CHANGE_ME placeholders.
---
- name: Verify multicloud snapshots demo prerequisites
  hosts: localhost
  gather_facts: false
  collections:
    - ansible.builtin

  tasks:
    - name: Confirm required AAP and demo variables are defined
      ansible.builtin.assert:
        that:
          - demo_organization_name is defined
          - demo_project_name is defined
        fail_msg: Copy demo_variables.yml.example to demo_variables.yml and set required values.
      tags:
        - verify

    # Required in every deployment mode: the snapshot job templates look up
    # the target VM/instance by these values (see the [ALWAYS REQUIRED]
    # sections in demo_variables.yml.example).
    - name: Confirm Azure/AWS target identity variables (required in every mode)
      ansible.builtin.assert:
        that:
          - azure_resource_group is defined
          - azure_vm_hostname is defined
          - aws_ec2_hostname is defined
          - aws_region is defined
        fail_msg: >-
          Azure/AWS target VM identity variables are incomplete. Check
          demo_variables.yml (azure_resource_group, azure_vm_hostname,
          aws_ec2_hostname, aws_region).
      tags:
        - verify

    # Only required in lab/dev mode (demo_manage_infrastructure: true); these
    # variables are exclusively consumed by Provision - */Deprovision - * (see
    # the [LAB/DEV ONLY] sections in demo_variables.yml.example) and are never
    # read in customer/PoC mode, so this check is skipped when the flag is false.
    - name: Confirm Azure/AWS provisioning variables (lab/dev mode only)
      ansible.builtin.assert:
        that:
          - azure_location is defined
          - azure_vm_size is defined
          - azure_vm_admin_user is defined
          - aws_ami_id is defined
          - aws_instance_type is defined
        fail_msg: >-
          Azure/AWS provisioning variables are incomplete. Check
          demo_variables.yml, or set demo_manage_infrastructure: false if you
          are deploying against pre-existing customer infrastructure.
      when: demo_manage_infrastructure | default(true) | bool
      tags:
        - verify

    - name: Confirm infra.aap_configuration collection is installed
      ansible.builtin.command:
        cmd: ansible-galaxy collection list infra.aap_configuration
      register: casc_collection
      changed_when: false
      failed_when: casc_collection.rc != 0
      tags:
        - verify

    - name: Confirm azure.azcollection collection is installed
      ansible.builtin.command:
        cmd: ansible-galaxy collection list azure.azcollection
      register: azure_collection
      changed_when: false
      failed_when: azure_collection.rc != 0
      tags:
        - verify

    - name: Confirm amazon.aws collection is installed
      ansible.builtin.command:
        cmd: ansible-galaxy collection list amazon.aws
      register: aws_collection
      changed_when: false
      failed_when: aws_collection.rc != 0
      tags:
        - verify

    - name: Report verification status
      ansible.builtin.debug:
        msg: >-
          Prerequisite checks passed.
          {{ 'Run WF - Demo setup to provision infrastructure, then launch WF - Multicloud snapshot and retention.'
             if (demo_manage_infrastructure | default(true) | bool)
             else 'demo_manage_infrastructure is false: launch WF - Multicloud snapshot and retention directly against the existing VM/instance.' }}
      tags:
        - verify
