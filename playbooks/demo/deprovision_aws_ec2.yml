# Description: Destroy the AWS demo EC2 instance and all associated networking.
# Removes resources in reverse dependency order: EC2 -> security group ->
# subnet -> route table -> internet gateway -> VPC. Key pair is optionally
# deleted if aws_delete_key_pair=true.
# Counterpart: provision_aws_ec2.yml (creates everything torn down here).
---
- name: Deprovision AWS demo EC2 instance and networking resources
  hosts: localhost
  gather_facts: false
  collections:
    - amazon.aws
    - ansible.builtin

  vars:
    target_hostname: "{{ aws_ec2_hostname | mandatory }}"
    aws_region: "{{ aws_region | default('us-east-1') }}"
    aws_vpc_name: "{{ aws_vpc_name | default('demo-multicloud-vpc') }}"
    aws_sg_name: "{{ aws_sg_name | default('demo-multicloud-sg') }}"
    aws_key_pair_name: "{{ aws_key_pair_name | default('demo-multicloud-keypair') }}"
    aws_delete_key_pair: "{{ aws_delete_key_pair | default(false) | bool }}"
    demo_tag: multicloud-snapshots

  tasks:
    - name: Terminate the demo EC2 instance
      amazon.aws.ec2_instance:
        region: "{{ aws_region }}"
        filters:
          "tag:Name": "{{ target_hostname }}"
          "tag:Demo": "{{ demo_tag }}"
        state: terminated
        wait: true
        wait_timeout: 300
      tags:
        - aws
        - deprovision
        - vm

    # Look up the VPC by name tag so downstream resource deletions have the ID.
    - name: Look up demo VPC by name tag
      amazon.aws.ec2_vpc_net_info:
        region: "{{ aws_region }}"
        filters:
          "tag:Name": "{{ aws_vpc_name }}"
          "tag:Demo": "{{ demo_tag }}"
      register: aws_vpc_lookup
      tags:
        - aws
        - deprovision
        - network

    # All remaining steps require the VPC to exist. If it was already deleted
    # (or never created), skip the network teardown gracefully.
    - name: Set VPC ID fact for teardown (skip if VPC not found)
      ansible.builtin.set_fact:
        teardown_vpc_id: "{{ aws_vpc_lookup.vpcs[0].id | default('') }}"
      tags:
        - aws
        - deprovision
        - network

    - name: Delete security group from the demo VPC
      amazon.aws.ec2_security_group:
        name: "{{ aws_sg_name }}"
        region: "{{ aws_region }}"
        vpc_id: "{{ teardown_vpc_id }}"
        state: absent
      when: teardown_vpc_id | length > 0
      tags:
        - aws
        - deprovision
        - network

    - name: Look up demo subnets in the VPC
      amazon.aws.ec2_vpc_subnet_info:
        region: "{{ aws_region }}"
        filters:
          vpc-id: "{{ teardown_vpc_id }}"
          "tag:Demo": "{{ demo_tag }}"
      register: aws_subnet_lookup
      when: teardown_vpc_id | length > 0
      tags:
        - aws
        - deprovision
        - network

    - name: Delete demo subnets
      amazon.aws.ec2_vpc_subnet:
        region: "{{ aws_region }}"
        vpc_id: "{{ teardown_vpc_id }}"
        cidr: "{{ item.cidr_block }}"
        state: absent
      loop: "{{ aws_subnet_lookup.subnets | default([]) }}"
      when: teardown_vpc_id | length > 0
      tags:
        - aws
        - deprovision
        - network

    - name: Look up route tables associated with the demo VPC
      amazon.aws.ec2_vpc_route_table_info:
        region: "{{ aws_region }}"
        filters:
          vpc-id: "{{ teardown_vpc_id }}"
          "tag:Demo": "{{ demo_tag }}"
      register: aws_rt_lookup
      when: teardown_vpc_id | length > 0
      tags:
        - aws
        - deprovision
        - network

    # Only delete custom route tables; the VPC main route table is removed
    # automatically when the VPC itself is deleted.
    - name: Delete custom route tables from the demo VPC
      amazon.aws.ec2_vpc_route_table:
        region: "{{ aws_region }}"
        vpc_id: "{{ teardown_vpc_id }}"
        route_table_id: "{{ item.id }}"
        lookup: id
        state: absent
      loop: "{{ aws_rt_lookup.route_tables | default([]) }}"
      when:
        - teardown_vpc_id | length > 0
        - not (item.associations | default([]) | selectattr('main', 'defined') | selectattr('main') | list | length > 0)
      tags:
        - aws
        - deprovision
        - network

    - name: Delete internet gateway from the demo VPC
      amazon.aws.ec2_vpc_igw:
        vpc_id: "{{ teardown_vpc_id }}"
        region: "{{ aws_region }}"
        state: absent
      when: teardown_vpc_id | length > 0
      tags:
        - aws
        - deprovision
        - network

    - name: Delete the demo VPC
      amazon.aws.ec2_vpc_net:
        name: "{{ aws_vpc_name }}"
        cidr_block: "{{ aws_vpc_cidr | default('10.1.0.0/16') }}"
        region: "{{ aws_region }}"
        state: absent
      when: teardown_vpc_id | length > 0
      tags:
        - aws
        - deprovision
        - network

    - name: Delete EC2 key pair (when explicitly requested)
      amazon.aws.ec2_key:
        name: "{{ aws_key_pair_name }}"
        region: "{{ aws_region }}"
        state: absent
      when: aws_delete_key_pair | bool
      tags:
        - aws
        - deprovision
        - network

    - name: Display AWS deprovision summary
      ansible.builtin.debug:
        msg: >-
          EC2 instance '{{ target_hostname }}' and associated networking
          resources removed from {{ aws_region }}.
          {{ 'Key pair also deleted.' if (aws_delete_key_pair | bool) else 'Key pair preserved.' }}
      tags:
        - aws
        - deprovision
