# Description: Discover an Azure VM by hostname and snapshot all managed disks.
# Requires Azure Service Principal credentials injected by AAP or environment.
---
- name: Create Azure disk snapshots for a VM identified by hostname
  hosts: localhost
  gather_facts: true
  collections:
    - azure.azcollection
    - ansible.builtin

  pre_tasks:
    - name: Validate required Azure snapshot variables
      ansible.builtin.assert:
        that:
          - target_hostname is defined
          - azure_resource_group is defined
        fail_msg: >-
          Pass target_hostname and azure_resource_group when running Azure snapshot jobs.
      tags:
        - always

    - name: Resolve Azure snapshot variables with defaults
      ansible.builtin.set_fact:
        snapshot_name_prefix: "{{ snapshot_name_prefix | default('poc-snapshot') }}"
      tags:
        - always

  tasks:
    - name: Look up Azure virtual machine by hostname
      azure.azcollection.azure_rm_virtualmachine_info:
        resource_group: "{{ azure_resource_group }}"
        name: "{{ target_hostname }}"
      register: azure_vm_info
      tags:
        - azure
        - discover

    - name: Ensure exactly one VM matches the hostname
      ansible.builtin.assert:
        that:
          - azure_vm_info.vms | length == 1
        fail_msg: >-
          Expected one VM named {{ target_hostname }} in {{ azure_resource_group }},
          found {{ azure_vm_info.vms | length }}.
      tags:
        - azure
        - discover

    # azure_rm_virtualmachine_info does not expose storage_profile in all versions
    # of azure.azcollection. Use azure_rm_resource_info to retrieve the raw Azure
    # REST API response, which consistently includes properties.storageProfile.
    - name: Get full Azure VM resource to extract managed disk IDs
      azure.azcollection.azure_rm_resource_info:
        resource_group: "{{ azure_resource_group }}"
        provider: Compute
        resource_type: virtualMachines
        resource_name: "{{ target_hostname }}"
        api_version: "2023-07-01"
      register: azure_vm_resource
      tags:
        - azure
        - discover

    # The raw REST API response uses camelCase: storageProfile, osDisk, managedDisk.
    # Combine the OS disk ID with any data disk IDs into a single list for snapshotting.
    - name: Build list of managed disk resource IDs attached to the VM
      ansible.builtin.set_fact:
        azure_disk_ids: >-
          {{
            [azure_vm_resource.response[0].properties.storageProfile.osDisk.managedDisk.id]
            + (azure_vm_resource.response[0].properties.storageProfile.dataDisks | default([])
               | map(attribute='managedDisk.id') | list)
          }}
      tags:
        - azure
        - discover

    - name: Create a snapshot for each managed disk
      azure.azcollection.azure_rm_snapshot:
        resource_group: "{{ azure_resource_group }}"
        name: >-
          {{ snapshot_name_prefix }}-{{ target_hostname }}-{{ item | basename | regex_replace('[^a-zA-Z0-9-]', '-') }}-{{ ansible_date_time.date | regex_replace('-', '') }}
        location: "{{ azure_vm_info.vms[0].location }}"
        creation_data:
          create_option: Copy
          source_id: "{{ item }}"
        tags:
          Demo: multicloud-snapshots
          SourceHostname: "{{ target_hostname }}"
          RetentionDays: "{{ snapshot_retention_days | default(30) | string }}"
      loop: "{{ azure_disk_ids }}"
      register: azure_snapshot_results
      tags:
        - azure
        - snapshot

    # Temporary diagnostic task — remove once return key is confirmed.
    - name: Dump first snapshot result to inspect return structure
      ansible.builtin.debug:
        var: azure_snapshot_results.results[0]
      tags:
        - azure
        - snapshot

    - name: Publish Azure snapshot results for downstream workflow nodes
      ansible.builtin.set_stats:
        data:
          azure_snapshots_created: "{{ azure_snapshot_results.results | map(attribute='state.id') | list }}"
          azure_snapshot_hostname: "{{ target_hostname }}"
      tags:
        - azure
        - snapshot

    - name: Display created Azure snapshot names
      ansible.builtin.debug:
        msg: "Created {{ azure_snapshot_results.results | length }} Azure snapshot(s) for {{ target_hostname }}."
      tags:
        - azure
        - snapshot
