# Description: Read-only pre-flight check for the multicloud snapshot demo.
# Looks up the Azure VM and AWS EC2 instance that "Snapshot - Azure/AWS by
# hostname" would target, and reports every disk/volume that would be
# snapshotted plus the naming pattern that snapshot names will follow.
# Never creates, modifies, or deletes any cloud resource — safe to run
# repeatedly, including against a customer's pre-existing infrastructure.
# Run this (or launch "Snapshot - Preview (dry run)" in AAP) before
# WF - Multicloud snapshot and retention to confirm the demo is pointed at
# the correct VMs. It also runs automatically as the first node of that
# workflow, so a wrong hostname/resource group fails fast before any
# snapshot is taken.
---
- name: Preview which VMs and disks the snapshot demo will target
  hosts: localhost
  gather_facts: false
  collections:
    - azure.azcollection
    - amazon.aws
    - ansible.builtin

  pre_tasks:
    - name: Validate required preview variables
      ansible.builtin.assert:
        that:
          - azure_resource_group is defined
          - azure_vm_hostname is defined
          - aws_ec2_hostname is defined
        fail_msg: >-
          Set azure_resource_group, azure_vm_hostname, and aws_ec2_hostname in
          demo_variables.yml or job template extra variables.
      tags:
        - always

    - name: Resolve preview variables with defaults
      ansible.builtin.set_fact:
        aws_region: "{{ aws_region | default('us-east-1') }}"
        snapshot_name_prefix: "{{ snapshot_name_prefix | default('poc-snapshot') }}"
      tags:
        - always

  tasks:
    # -------------------------------------------------------------------------
    # Azure preview
    # -------------------------------------------------------------------------
    - name: Look up Azure virtual machine by hostname
      azure.azcollection.azure_rm_virtualmachine_info:
        resource_group: "{{ azure_resource_group }}"
        name: "{{ azure_vm_hostname }}"
        auth_source: "{{ 'msi' if (azure_auth_mode | default('service_principal') == 'msi') else omit }}"
      register: azure_vm_info
      tags:
        - azure
        - preview

    - name: Ensure exactly one Azure VM matches the hostname
      ansible.builtin.assert:
        that:
          - azure_vm_info.vms | length == 1
        fail_msg: >-
          Expected one VM named {{ azure_vm_hostname }} in {{ azure_resource_group }},
          found {{ azure_vm_info.vms | length }}. Fix azure_resource_group /
          azure_vm_hostname in demo_variables.yml before running the snapshot workflow.
      tags:
        - azure
        - preview

    # Same REST API lookup as snapshot_azure.yml, so the disk list previewed
    # here is identical to what the real snapshot job would enumerate.
    - name: Get full Azure VM resource to extract managed disk IDs
      azure.azcollection.azure_rm_resource_info:
        resource_group: "{{ azure_resource_group }}"
        provider: Compute
        resource_type: virtualMachines
        resource_name: "{{ azure_vm_hostname }}"
        api_version: "2023-07-01"
        auth_source: "{{ 'msi' if (azure_auth_mode | default('service_principal') == 'msi') else omit }}"
      register: azure_vm_resource
      tags:
        - azure
        - preview

    - name: Build list of managed disk names attached to the VM
      ansible.builtin.set_fact:
        azure_disk_names: >-
          {{
            (
              [azure_vm_resource.response[0].properties.storageProfile.osDisk.managedDisk.id]
              + (azure_vm_resource.response[0].properties.storageProfile.dataDisks | default([])
                 | map(attribute='managedDisk.id') | list)
            ) | map('basename') | list
          }}
      tags:
        - azure
        - preview

    - name: Report Azure preview
      ansible.builtin.debug:
        msg:
          - "Azure VM: {{ azure_vm_hostname }} (resource group: {{ azure_resource_group }}, size: {{ azure_vm_info.vms[0].vm_size }}, location: {{ azure_vm_info.vms[0].location }})"
          - "Disks that would be snapshotted ({{ azure_disk_names | length }}): {{ azure_disk_names | join(', ') }}"
          - "Snapshot naming pattern: {{ snapshot_name_prefix }}-{{ azure_vm_hostname }}-<disk-name>-<YYYYMMDD>-<HHMM>"
      tags:
        - azure
        - preview

    # -------------------------------------------------------------------------
    # AWS preview
    # -------------------------------------------------------------------------
    - name: Look up EC2 instance by Name tag matching hostname
      amazon.aws.ec2_instance_info:
        region: "{{ aws_region }}"
        filters:
          "tag:Name": "{{ aws_ec2_hostname }}"
          instance-state-name: running
      register: aws_ec2_info
      tags:
        - aws
        - preview

    - name: Ensure exactly one running EC2 instance matches the hostname
      ansible.builtin.assert:
        that:
          - aws_ec2_info.instances | length == 1
        fail_msg: >-
          Expected one running EC2 instance with tag Name={{ aws_ec2_hostname }} in
          {{ aws_region }}, found {{ aws_ec2_info.instances | length }}. Fix
          aws_ec2_hostname / aws_region in demo_variables.yml before running the
          snapshot workflow.
      tags:
        - aws
        - preview

    - name: Report AWS preview
      ansible.builtin.debug:
        msg:
          - >-
            AWS instance: {{ aws_ec2_hostname }} (region: {{ aws_region }},
            type: {{ aws_ec2_info.instances[0].instance_type }},
            id: {{ aws_ec2_info.instances[0].instance_id }})
          - >-
            Volumes that would be snapshotted ({{ aws_ec2_info.instances[0].block_device_mappings | length }}):
            {{ aws_ec2_info.instances[0].block_device_mappings | map(attribute='device_name') | list | join(', ') }}
          - "Snapshot naming pattern: {{ snapshot_name_prefix }}-{{ aws_ec2_hostname }}-<device-name>"
      tags:
        - aws
        - preview

    - name: Publish preview summary for downstream workflow nodes
      ansible.builtin.set_stats:
        data:
          preview_azure_vm: "{{ azure_vm_hostname }}"
          preview_azure_disk_count: "{{ azure_disk_names | length }}"
          preview_aws_instance: "{{ aws_ec2_hostname }}"
          preview_aws_volume_count: "{{ aws_ec2_info.instances[0].block_device_mappings | length }}"
      tags:
        - preview
