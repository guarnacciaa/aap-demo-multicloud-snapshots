# Description: Remove AAP objects created by this demo (destructive).
# Requires explicit confirmation via demo_cleanup_confirm=true extra var.
#
# Objects are removed in reverse dependency order so that parent references
# (organization, inventory) still resolve during deletion.  Labels are
# skipped because the Controller API does not support state: absent for
# labels; they are removed automatically when the organization is deleted.
#
# Each task uses ignore_errors so the playbook completes even if an object
# was already removed or was never created. This also makes cleanup safe
# regardless of demo_manage_infrastructure: the loops below always include the
# provisioning/teardown job and workflow template names, which simply do not
# exist (and are skipped via ignore_errors) when the demo was deployed with
# demo_manage_infrastructure: false.
---
- name: Cleanup multicloud snapshots demo from AAP
  hosts: localhost
  connection: local
  gather_facts: false
  collections:
    - ansible.controller
    - ansible.builtin

  vars_files:
    - ../vault.yml
    - ../group_vars/all/demo_variables.yml

  vars:
    controller_auth: &controller_auth
      controller_host: "https://{{ aap_hostname }}"
      controller_username: "{{ aap_username }}"
      controller_password: "{{ aap_password }}"
      validate_certs: "{{ aap_validate_certs }}"

  pre_tasks:
    - name: Require demo_cleanup_confirm=true before removing AAP objects
      ansible.builtin.assert:
        that:
          - demo_cleanup_confirm | default(false) | bool
        fail_msg: >-
          Refusing to run cleanup. Pass -e demo_cleanup_confirm=true to
          remove demo organizations, projects, templates, and inventories.
      tags:
        - always

  tasks:
    # --- 1. Workflow templates (depend on job templates) ---
    - name: Remove workflow templates
      ansible.controller.workflow_job_template:
        name: "{{ item }}"
        organization: "{{ demo_organization_name }}"
        state: absent
        <<: *controller_auth
      loop:
        - "WF - Demo setup (provision infrastructure)"
        - "WF - Multicloud snapshot and retention"
        - "WF - Demo teardown (destroy infrastructure)"
      ignore_errors: true
      tags:
        - workflows

    # --- 2. Job templates (depend on project, inventory, credentials) ---
    - name: Remove job templates
      ansible.controller.job_template:
        name: "{{ item }}"
        organization: "{{ demo_organization_name }}"
        state: absent
        <<: *controller_auth
      loop:
        - "Provision - Azure VM"
        - "Provision - AWS EC2"
        - "Update - Multicloud inventory hosts"
        - "Snapshot - Azure by hostname"
        - "Snapshot - AWS by hostname"
        - "Snapshot - Verify"
        - "Snapshot - Cleanup (optional)"
        - "Deprovision - Azure VM"
        - "Deprovision - AWS EC2"
      ignore_errors: true
      tags:
        - templates

    # --- 3. Inventories (child inventories before parent) ---
    - name: Remove inventories
      ansible.controller.inventory:
        name: "{{ item }}"
        organization: "{{ demo_organization_name }}"
        state: absent
        <<: *controller_auth
      loop:
        - "{{ demo_azure_inventory_name }}"
        - "{{ demo_aws_inventory_name }}"
        - "{{ demo_inventory_name }}"
      ignore_errors: true
      tags:
        - inventories

    # --- 4. Project ---
    - name: Remove project
      ansible.controller.project:
        name: "{{ demo_project_name }}"
        organization: "{{ demo_organization_name }}"
        state: absent
        <<: *controller_auth
      ignore_errors: true
      tags:
        - projects

    # --- 5. Credentials ---
    - name: Remove credentials
      ansible.controller.credential:
        name: "{{ item.name }}"
        organization: "{{ demo_organization_name }}"
        credential_type: "{{ item.type }}"
        state: absent
        <<: *controller_auth
      loop:
        - name: "{{ azure_credential_name }}"
          type: Microsoft Azure Resource Manager
        - name: "{{ aws_credential_name }}"
          type: Amazon Web Services
        - name: "{{ hub_registry_credential_name }}"
          type: Container Registry
      ignore_errors: true
      tags:
        - credentials

    # --- 6. Execution environment ---
    - name: Remove execution environment
      ansible.controller.execution_environment:
        name: "{{ demo_execution_environment_name }}"
        organization: "{{ demo_organization_name }}"
        state: absent
        <<: *controller_auth
      ignore_errors: true
      tags:
        - execution_environments

    # --- 7. Labels ---
    # The Controller API does not support deleting labels directly.
    # They are removed when the parent organization is deleted below.
    - name: Labels will be removed with the organization
      ansible.builtin.debug:
        msg: "Skipping labels — no direct delete API; removed with organization."
      tags:
        - labels

    # --- 8. Organization (last — parent of all objects above) ---
    # Look up related_field_counts before deleting: an Organization delete cascades to
    # every Project/Inventory/EE/Credential filed under it, including ones this demo did
    # not create if demo_organization_name ever collided with another artifact's Organization.
    - name: Resolve organization record before deletion
      ansible.builtin.set_fact:
        _demo_organization: >-
          {{
            query(
              'ansible.controller.controller_api',
              'organizations',
              host='https://' ~ aap_hostname,
              username=aap_username,
              password=aap_password,
              validate_certs=aap_validate_certs,
              query_params={'name': demo_organization_name}
            ) | first | default({})
          }}
      tags:
        - organization

    - name: Refuse to delete an organization that holds more than this demo's project
      ansible.builtin.assert:
        that:
          - (_demo_organization.related_field_counts.projects | default(0)) <= 1
        fail_msg: >-
          Organization "{{ demo_organization_name }}" has
          {{ _demo_organization.related_field_counts.projects | default(0) }} projects —
          more than the single project this demo owns. It is likely shared with another
          demo. Refusing to delete it to avoid destroying objects this playbook did not
          create. Rename demo_organization_name in demo_variables.yml to a value unique to
          this artifact, or remove the unrelated objects manually before re-running with
          --tags organization.
      when: _demo_organization | length > 0
      tags:
        - organization

    - name: Remove organization
      ansible.controller.organization:
        name: "{{ demo_organization_name }}"
        state: absent
        <<: *controller_auth
      ignore_errors: true
      tags:
        - organization

  post_tasks:
    - name: Cleanup summary
      ansible.builtin.debug:
        msg: >-
          Cleanup complete. All demo objects have been removed from AAP.
          To re-deploy, run: ansible-playbook playbooks/aap_config.yml
      tags:
        - always
