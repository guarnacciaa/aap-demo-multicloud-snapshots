---
# Multicloud inventory hierarchy: two source inventories (Azure, AWS) feed
# into a single constructed inventory (Demo-Multicloud).
# The source inventories must be defined first so they exist when the
# constructed inventory references them via input_inventories.
controller_inventories:
  - name: Azure-Resources
    organization: "{{ demo_organization_name }}"
    description: Azure VMs and resources for snapshot workflows

  - name: AWS-Resources
    organization: "{{ demo_organization_name }}"
    description: AWS EC2 instances and resources for snapshot workflows

  - name: "{{ demo_inventory_name }}"
    organization: "{{ demo_organization_name }}"
    description: Constructed inventory aggregating Azure and AWS resources
    kind: constructed
    input_inventories:
      - Azure-Resources
      - AWS-Resources
