---
# Infrastructure lifecycle job templates: only merged into controller_templates
# (see playbooks/aap_config.yml pre_tasks) when demo_manage_infrastructure is
# true. These create and destroy cloud networking and VMs from scratch, so
# they must not exist in AAP for customer/PoC deployments that reuse existing
# infrastructure (see docs/setup.md).
#
# Kept under a separate var name (controller_templates_infra) so group_vars
# auto-loading this file does not unconditionally add these templates to the
# main controller_templates list; the merge is opt-in via the flag.
controller_templates_infra:
  - name: Provision - Azure VM
    organization: "{{ demo_organization_name }}"
    inventory: "{{ demo_inventory_name }}"
    project: "{{ demo_project_name }}"
    playbook: playbooks/demo/provision_azure_vm.yml
    execution_environment: "{{ demo_execution_environment_name }}"
    credentials:
      - "{{ azure_credential_name }}"
    ask_variables_on_launch: true
    extra_vars:
      azure_vm_hostname: "{{ azure_vm_hostname }}"
      azure_resource_group: "{{ azure_resource_group }}"
      azure_location: "{{ azure_location }}"
      azure_vm_size: "{{ azure_vm_size }}"
      azure_vm_admin_user: "{{ azure_vm_admin_user }}"
      azure_vm_admin_password: "{{ azure_vm_admin_password }}"
    labels:
      - "{{ demo_label_name }}"

  - name: Provision - AWS EC2
    organization: "{{ demo_organization_name }}"
    inventory: "{{ demo_inventory_name }}"
    project: "{{ demo_project_name }}"
    playbook: playbooks/demo/provision_aws_ec2.yml
    execution_environment: "{{ demo_execution_environment_name }}"
    credentials:
      - "{{ aws_credential_name }}"
    ask_variables_on_launch: true
    extra_vars:
      aws_ec2_hostname: "{{ aws_ec2_hostname }}"
      aws_region: "{{ aws_region }}"
      aws_instance_type: "{{ aws_instance_type }}"
      aws_ami_id: "{{ aws_ami_id }}"
      aws_key_pair_name: "{{ aws_key_pair_name }}"
    labels:
      - "{{ demo_label_name }}"

  - name: Update - Multicloud inventory hosts
    organization: "{{ demo_organization_name }}"
    inventory: "{{ demo_inventory_name }}"
    project: "{{ demo_project_name }}"
    playbook: playbooks/demo/update_inventory_hosts.yml
    # Requires the custom EE: uses azure.azcollection and amazon.aws to look up
    # public IPs before updating AAP host variables via ansible.controller.
    execution_environment: "{{ demo_execution_environment_name }}"
    credentials:
      - "{{ azure_credential_name }}"
      - "{{ aws_credential_name }}"
    ask_variables_on_launch: false
    extra_vars:
      aap_hostname: "{{ aap_hostname }}"
      aap_username: "{{ aap_username }}"
      aap_password: "{{ aap_password }}"
      # aap_token takes priority over username/password for AAP 2.5+ gateway auth.
      # Omitted (empty string) when not defined; the playbook handles the fallback.
      aap_token: "{{ aap_token | default('') }}"
      aap_validate_certs: "{{ aap_validate_certs }}"
      azure_vm_hostname: "{{ azure_vm_hostname }}"
      azure_resource_group: "{{ azure_resource_group }}"
      aws_ec2_hostname: "{{ aws_ec2_hostname }}"
      aws_region: "{{ aws_region }}"
      # Required by tasks/sync_constructed_inventory.yml to look up and sync
      # the constructed inventory after child host updates.
      demo_inventory_name: "{{ demo_inventory_name }}"
      demo_organization_name: "{{ demo_organization_name }}"
    labels:
      - "{{ demo_label_name }}"

  - name: Deprovision - Azure VM
    organization: "{{ demo_organization_name }}"
    inventory: "{{ demo_inventory_name }}"
    project: "{{ demo_project_name }}"
    playbook: playbooks/demo/deprovision_azure_vm.yml
    execution_environment: "{{ demo_execution_environment_name }}"
    credentials:
      - "{{ azure_credential_name }}"
    ask_variables_on_launch: true
    extra_vars:
      azure_vm_hostname: "{{ azure_vm_hostname }}"
      azure_resource_group: "{{ azure_resource_group }}"
    labels:
      - "{{ demo_label_name }}"

  - name: Deprovision - AWS EC2
    organization: "{{ demo_organization_name }}"
    inventory: "{{ demo_inventory_name }}"
    project: "{{ demo_project_name }}"
    playbook: playbooks/demo/deprovision_aws_ec2.yml
    execution_environment: "{{ demo_execution_environment_name }}"
    credentials:
      - "{{ aws_credential_name }}"
    ask_variables_on_launch: true
    extra_vars:
      aws_ec2_hostname: "{{ aws_ec2_hostname }}"
      aws_region: "{{ aws_region }}"
    labels:
      - "{{ demo_label_name }}"
