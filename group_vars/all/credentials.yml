---
# AAP 2.5+ credential input field names differ from older versions.
# Azure: subscription, client, secret, tenant (not subscription_id, etc.)
# AWS: username, password
controller_credentials:
  - name: "{{ azure_credential_name }}"
    organization: "{{ demo_organization_name }}"
    credential_type: Microsoft Azure Resource Manager
    inputs:
      subscription: "{{ azure_subscription_id }}"
      client: "{{ azure_client_id }}"
      secret: "{{ azure_client_secret }}"
      tenant: "{{ azure_tenant_id }}"
    state: "{{ 'present' if (azure_subscription_id != 'CHANGE_ME') else 'absent' }}"

  - name: "{{ aws_credential_name }}"
    organization: "{{ demo_organization_name }}"
    credential_type: Amazon Web Services
    inputs:
      username: "{{ aws_access_key }}"
      password: "{{ aws_secret_key }}"
    state: "{{ 'present' if (aws_access_key != 'CHANGE_ME') else 'absent' }}"

  # Lets the Controller pull custom EEs from Private Automation Hub when the
  # registry uses a self-signed certificate (typical on growth deployments).
  - name: "{{ hub_registry_credential_name }}"
    organization: "{{ demo_organization_name }}"
    credential_type: Container Registry
    inputs:
      host: "{{ hub_registry_host }}"
      username: "{{ aap_username }}"
      password: "{{ aap_password }}"
      verify_ssl: false
    state: "{{ 'present' if (demo_execution_environment_image != 'CHANGE_ME/ee-multicloud-snapshots:latest') else 'absent' }}"
