---
# Static hosts representing customer-provided VMs (hostname/IP from prerequisites).
controller_hosts:
  - name: "{{ azure_vm_hostname }}"
    inventory: Azure-Resources
    variables:
      cloud: azure
      ansible_host: CHANGE_ME_AZURE_PRIVATE_IP
      snapshot_target: true

  - name: "{{ aws_ec2_hostname }}"
    inventory: AWS-Resources
    variables:
      cloud: aws
      ansible_host: CHANGE_ME_AWS_PRIVATE_IP
      snapshot_target: true
