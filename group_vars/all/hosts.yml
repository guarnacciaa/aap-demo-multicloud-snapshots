---
# Hosts representing demo VMs created by the provisioning playbooks.
# The ansible_host values are placeholders; update them after running
# the setup workflow if you need direct SSH access. The snapshot playbooks
# target VMs by hostname via cloud APIs (not SSH), so these IPs are only
# required for host-level operations.
controller_hosts:
  - name: "{{ azure_vm_hostname }}"
    inventory: "{{ demo_azure_inventory_name }}"
    variables:
      cloud: azure
      ansible_host: "{{ azure_vm_hostname }}"
      snapshot_target: true

  - name: "{{ aws_ec2_hostname }}"
    inventory: "{{ demo_aws_inventory_name }}"
    variables:
      cloud: aws
      ansible_host: "{{ aws_ec2_hostname }}"
      snapshot_target: true
