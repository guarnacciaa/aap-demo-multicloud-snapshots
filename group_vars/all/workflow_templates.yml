---
# Dispatch role reads controller_workflows for workflow job templates.
controller_workflows:
  - name: WF - Multicloud snapshot and retention
    description: Snapshot Azure and AWS VMs by hostname, verify, optionally purge old snapshots.
    organization: "{{ demo_organization_name }}"
    inventory: "{{ demo_inventory_name }}"
    project: "{{ demo_project_name }}"
    labels:
      - "{{ demo_label_name }}"
    workflow_nodes:
      - identifier: snapshot_azure
        unified_job_template:
          organization:
            name: "{{ demo_organization_name }}"
          name: Snapshot - Azure by hostname
      - identifier: snapshot_aws
        unified_job_template:
          organization:
            name: "{{ demo_organization_name }}"
          name: Snapshot - AWS by hostname
        related:
          - identifier: snapshot_azure
            type: success
      - identifier: verify_snapshots
        unified_job_template:
          organization:
            name: "{{ demo_organization_name }}"
          name: Snapshot - Verify
        related:
          - identifier: snapshot_aws
            type: success
      - identifier: cleanup_snapshots
        unified_job_template:
          organization:
            name: "{{ demo_organization_name }}"
          name: Snapshot - Cleanup (optional)
        related:
          - identifier: verify_snapshots
            type: success
