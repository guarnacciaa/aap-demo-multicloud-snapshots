---
# Dispatch role reads controller_workflows for workflow job templates.
#
# Three workflows cover the full demo lifecycle:
#   1. Setup    — provision infrastructure from scratch (Azure VM + AWS EC2)
#   2. Demo     — run the multicloud snapshot and retention scenario
#   3. Teardown — clean up snapshots and destroy all provisioned infrastructure
#
# The setup workflow must complete before running the demo workflow.
# The teardown workflow is meant for post-demo cleanup.

controller_workflows:
  # --- 1. Infrastructure setup workflow ---
  - name: WF - Demo setup (provision infrastructure)
    description: >-
      Provision Azure VM and AWS EC2 instance with networking.
      Run this before the snapshot demo workflow.
    organization: "{{ demo_organization_name }}"
    inventory: "{{ demo_inventory_name }}"
    project: "{{ demo_project_name }}"
    labels:
      - "{{ demo_label_name }}"
    workflow_nodes:
      - identifier: provision_azure
        unified_job_template:
          organization:
            name: "{{ demo_organization_name }}"
          name: Provision - Azure VM
      - identifier: provision_aws
        unified_job_template:
          organization:
            name: "{{ demo_organization_name }}"
          name: Provision - AWS EC2
        # Azure and AWS provisioning run in parallel (no dependency between
        # them). Both feed into a success convergence point at the workflow
        # level. We do not set a "related" key here, so AAP treats both root
        # nodes as concurrent starts.

  # --- 2. Snapshot and retention demo workflow ---
  - name: WF - Multicloud snapshot and retention
    description: Snapshot Azure and AWS VMs by hostname, verify, optionally purge old snapshots.
    organization: "{{ demo_organization_name }}"
    inventory: "{{ demo_inventory_name }}"
    project: "{{ demo_project_name }}"
    labels:
      - "{{ demo_label_name }}"
    workflow_nodes:
      - identifier: snapshot_azure
        unified_job_template:
          organization:
            name: "{{ demo_organization_name }}"
          name: Snapshot - Azure by hostname
      - identifier: snapshot_aws
        unified_job_template:
          organization:
            name: "{{ demo_organization_name }}"
          name: Snapshot - AWS by hostname
        related:
          - identifier: snapshot_azure
            type: success
      - identifier: verify_snapshots
        unified_job_template:
          organization:
            name: "{{ demo_organization_name }}"
          name: Snapshot - Verify
        related:
          - identifier: snapshot_aws
            type: success
      - identifier: cleanup_snapshots
        unified_job_template:
          organization:
            name: "{{ demo_organization_name }}"
          name: Snapshot - Cleanup (optional)
        related:
          - identifier: verify_snapshots
            type: success

  # --- 3. Full teardown workflow ---
  - name: WF - Demo teardown (destroy infrastructure)
    description: >-
      Clean up snapshots and destroy all demo infrastructure (Azure VM,
      AWS EC2, networking). Run after the demo is complete.
    organization: "{{ demo_organization_name }}"
    inventory: "{{ demo_inventory_name }}"
    project: "{{ demo_project_name }}"
    labels:
      - "{{ demo_label_name }}"
    workflow_nodes:
      # Step 1: clean up demo snapshots first (both clouds in parallel).
      - identifier: cleanup_snapshots
        unified_job_template:
          organization:
            name: "{{ demo_organization_name }}"
          name: Snapshot - Cleanup (optional)
        extra_data:
          enable_snapshot_cleanup: true
          snapshot_retention_days: 0

      # Step 2: deprovision Azure VM after snapshot cleanup.
      - identifier: deprovision_azure
        unified_job_template:
          organization:
            name: "{{ demo_organization_name }}"
          name: Deprovision - Azure VM
        related:
          - identifier: cleanup_snapshots
            type: success

      # Step 3: deprovision AWS EC2 after snapshot cleanup.
      # Runs in parallel with Azure deprovision since they are independent.
      - identifier: deprovision_aws
        unified_job_template:
          organization:
            name: "{{ demo_organization_name }}"
          name: Deprovision - AWS EC2
        related:
          - identifier: cleanup_snapshots
            type: success
