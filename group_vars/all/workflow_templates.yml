---
# Snapshot and retention workflow: always deployed regardless of
# demo_manage_infrastructure. It only snapshots, verifies, and optionally
# purges existing VMs/instances; it never touches cloud networking.
#
# Dispatch role reads controller_workflows for workflow job templates.
# Uses simplified_workflow_nodes (string template names + edge lists) which
# avoids module-level issues with workflow_nodes / unified_job_template.
controller_workflows:
  - name: WF - Multicloud snapshot and retention
    description: Snapshot Azure and AWS VMs by hostname, verify, optionally purge old snapshots.
    organization: "{{ demo_organization_name }}"
    labels:
      - "{{ demo_label_name }}"
    state: present
    simplified_workflow_nodes:
      # Read-only credential/connectivity check: confirms AAP can
      # authenticate to Azure and AWS before any VM lookup runs.
      - identifier: connectivity_check
        unified_job_template: Snapshot - Connectivity check (dry run)
        organization: "{{ demo_organization_name }}"
        success_nodes:
          - preview_snapshot_targets
        failure_nodes: []
        always_nodes: []
      # Read-only pre-flight check: confirms the target VM/instance exists and
      # reports which disks/volumes will be snapshotted before any snapshot
      # is created. A missing/misnamed VM fails here, before any mutation.
      - identifier: preview_snapshot_targets
        unified_job_template: Snapshot - Preview (dry run)
        organization: "{{ demo_organization_name }}"
        success_nodes:
          - snapshot_azure
        failure_nodes: []
        always_nodes: []
      - identifier: snapshot_azure
        unified_job_template: Snapshot - Azure by hostname
        organization: "{{ demo_organization_name }}"
        success_nodes:
          - snapshot_aws
        failure_nodes: []
        always_nodes: []
      - identifier: snapshot_aws
        unified_job_template: Snapshot - AWS by hostname
        organization: "{{ demo_organization_name }}"
        success_nodes:
          - verify_snapshots
        failure_nodes: []
        always_nodes: []
      - identifier: verify_snapshots
        unified_job_template: Snapshot - Verify
        organization: "{{ demo_organization_name }}"
        success_nodes:
          - cleanup_preview
        failure_nodes: []
        always_nodes: []
      # Read-only: reports which existing snapshots the retention policy
      # would remove, regardless of whether cleanup is actually enabled.
      - identifier: cleanup_preview
        unified_job_template: Snapshot - Cleanup preview (dry run)
        organization: "{{ demo_organization_name }}"
        success_nodes:
          - cleanup_snapshots
        failure_nodes: []
        always_nodes: []
      - identifier: cleanup_snapshots
        unified_job_template: Snapshot - Cleanup (optional)
        organization: "{{ demo_organization_name }}"
        success_nodes: []
        failure_nodes: []
        always_nodes: []
