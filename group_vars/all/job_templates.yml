---
# Dispatch role reads controller_templates (not controller_job_templates).
# --- Infrastructure provisioning templates ---
controller_templates:
  - name: Provision - Azure VM
    organization: "{{ demo_organization_name }}"
    inventory: "{{ demo_inventory_name }}"
    project: "{{ demo_project_name }}"
    playbook: playbooks/demo/provision_azure_vm.yml
    execution_environment: "{{ demo_execution_environment_name }}"
    credentials:
      - "{{ azure_credential_name }}"
    ask_variables_on_launch: true
    extra_vars:
      azure_vm_hostname: "{{ azure_vm_hostname }}"
      azure_resource_group: "{{ azure_resource_group }}"
      azure_location: "{{ azure_location }}"
      azure_vm_size: "{{ azure_vm_size }}"
      azure_vm_admin_user: "{{ azure_vm_admin_user }}"
      azure_vm_admin_password: "{{ azure_vm_admin_password }}"
    labels:
      - "{{ demo_label_name }}"

  - name: Provision - AWS EC2
    organization: "{{ demo_organization_name }}"
    inventory: "{{ demo_inventory_name }}"
    project: "{{ demo_project_name }}"
    playbook: playbooks/demo/provision_aws_ec2.yml
    execution_environment: "{{ demo_execution_environment_name }}"
    credentials:
      - "{{ aws_credential_name }}"
    ask_variables_on_launch: true
    extra_vars:
      aws_ec2_hostname: "{{ aws_ec2_hostname }}"
      aws_region: "{{ aws_region }}"
      aws_instance_type: "{{ aws_instance_type }}"
      aws_ami_id: "{{ aws_ami_id }}"
      aws_key_pair_name: "{{ aws_key_pair_name }}"
    labels:
      - "{{ demo_label_name }}"

  # --- Snapshot templates ---

  - name: Snapshot - Azure by hostname
    organization: "{{ demo_organization_name }}"
    inventory: "{{ demo_inventory_name }}"
    project: "{{ demo_project_name }}"
    playbook: playbooks/demo/snapshot_azure.yml
    execution_environment: "{{ demo_execution_environment_name }}"
    credentials:
      - "{{ azure_credential_name }}"
    ask_variables_on_launch: true
    extra_vars:
      target_hostname: "{{ azure_vm_hostname }}"
      azure_resource_group: "{{ azure_resource_group }}"
    labels:
      - "{{ demo_label_name }}"

  - name: Snapshot - AWS by hostname
    organization: "{{ demo_organization_name }}"
    inventory: "{{ demo_inventory_name }}"
    project: "{{ demo_project_name }}"
    playbook: playbooks/demo/snapshot_aws.yml
    execution_environment: "{{ demo_execution_environment_name }}"
    credentials:
      - "{{ aws_credential_name }}"
    ask_variables_on_launch: true
    extra_vars:
      target_hostname: "{{ aws_ec2_hostname }}"
      aws_region: "{{ aws_region }}"
    labels:
      - "{{ demo_label_name }}"

  - name: Snapshot - Verify
    organization: "{{ demo_organization_name }}"
    inventory: "{{ demo_inventory_name }}"
    project: "{{ demo_project_name }}"
    playbook: playbooks/demo/snapshot_verify.yml
    execution_environment: "{{ demo_execution_environment_name }}"
    credentials:
      - "{{ azure_credential_name }}"
      - "{{ aws_credential_name }}"
    ask_variables_on_launch: false
    labels:
      - "{{ demo_label_name }}"

  - name: Snapshot - Cleanup (optional)
    organization: "{{ demo_organization_name }}"
    inventory: "{{ demo_inventory_name }}"
    project: "{{ demo_project_name }}"
    playbook: playbooks/demo/snapshot_cleanup.yml
    execution_environment: "{{ demo_execution_environment_name }}"
    credentials:
      - "{{ azure_credential_name }}"
      - "{{ aws_credential_name }}"
    ask_variables_on_launch: true
    extra_vars:
      enable_snapshot_cleanup: "{{ enable_snapshot_cleanup | default(false) }}"
      snapshot_retention_days: "{{ snapshot_retention_days }}"
    labels:
      - "{{ demo_label_name }}"

  # --- Infrastructure teardown templates ---

  - name: Deprovision - Azure VM
    organization: "{{ demo_organization_name }}"
    inventory: "{{ demo_inventory_name }}"
    project: "{{ demo_project_name }}"
    playbook: playbooks/demo/deprovision_azure_vm.yml
    execution_environment: "{{ demo_execution_environment_name }}"
    credentials:
      - "{{ azure_credential_name }}"
    ask_variables_on_launch: true
    extra_vars:
      azure_vm_hostname: "{{ azure_vm_hostname }}"
      azure_resource_group: "{{ azure_resource_group }}"
    labels:
      - "{{ demo_label_name }}"

  - name: Deprovision - AWS EC2
    organization: "{{ demo_organization_name }}"
    inventory: "{{ demo_inventory_name }}"
    project: "{{ demo_project_name }}"
    playbook: playbooks/demo/deprovision_aws_ec2.yml
    execution_environment: "{{ demo_execution_environment_name }}"
    credentials:
      - "{{ aws_credential_name }}"
    ask_variables_on_launch: true
    extra_vars:
      aws_ec2_hostname: "{{ aws_ec2_hostname }}"
      aws_region: "{{ aws_region }}"
    labels:
      - "{{ demo_label_name }}"
