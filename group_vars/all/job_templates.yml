---
# Dispatch role reads controller_templates (not controller_job_templates).
controller_templates:
  - name: Snapshot - Azure by hostname
    organization: "{{ demo_organization_name }}"
    inventory: "{{ demo_inventory_name }}"
    project: "{{ demo_project_name }}"
    playbook: playbooks/demo/snapshot_azure.yml
    execution_environment: "{{ demo_execution_environment_name }}"
    credentials:
      - "{{ azure_credential_name }}"
    ask_variables_on_launch: true
    extra_vars:
      target_hostname: "{{ azure_vm_hostname }}"
      azure_resource_group: "{{ azure_resource_group }}"
    labels:
      - "{{ demo_label_name }}"

  - name: Snapshot - AWS by hostname
    organization: "{{ demo_organization_name }}"
    inventory: "{{ demo_inventory_name }}"
    project: "{{ demo_project_name }}"
    playbook: playbooks/demo/snapshot_aws.yml
    execution_environment: "{{ demo_execution_environment_name }}"
    credentials:
      - "{{ aws_credential_name }}"
    ask_variables_on_launch: true
    extra_vars:
      target_hostname: "{{ aws_ec2_hostname }}"
      aws_region: "{{ aws_region }}"
    labels:
      - "{{ demo_label_name }}"

  - name: Snapshot - Verify
    organization: "{{ demo_organization_name }}"
    inventory: "{{ demo_inventory_name }}"
    project: "{{ demo_project_name }}"
    playbook: playbooks/demo/snapshot_verify.yml
    execution_environment: "{{ demo_execution_environment_name }}"
    credentials:
      - "{{ azure_credential_name }}"
      - "{{ aws_credential_name }}"
    ask_variables_on_launch: false
    labels:
      - "{{ demo_label_name }}"

  - name: Snapshot - Cleanup (optional)
    organization: "{{ demo_organization_name }}"
    inventory: "{{ demo_inventory_name }}"
    project: "{{ demo_project_name }}"
    playbook: playbooks/demo/snapshot_cleanup.yml
    execution_environment: "{{ demo_execution_environment_name }}"
    credentials:
      - "{{ azure_credential_name }}"
      - "{{ aws_credential_name }}"
    ask_variables_on_launch: true
    extra_vars:
      enable_snapshot_cleanup: "{{ enable_snapshot_cleanup | default(false) }}"
      snapshot_retention_days: "{{ snapshot_retention_days }}"
    labels:
      - "{{ demo_label_name }}"
