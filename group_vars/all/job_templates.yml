---
# Snapshot job templates: always deployed regardless of demo_manage_infrastructure.
# They only discover an existing VM/instance by hostname and create snapshots;
# they never create or destroy cloud infrastructure, so they are safe in both
# lab/dev (self-provisioned) and customer/PoC (bring-your-own) deployments.
# Dispatch role reads controller_templates (not controller_job_templates).
controller_templates:
  - name: Snapshot - Connectivity check (dry run)
    organization: "{{ demo_organization_name }}"
    inventory: "{{ demo_inventory_name }}"
    project: "{{ demo_project_name }}"
    playbook: playbooks/demo/precheck_connectivity.yml
    execution_environment: "{{ demo_execution_environment_name }}"
    credentials:
      - "{{ azure_credential_name }}"
      - "{{ aws_credential_name }}"
    ask_variables_on_launch: true
    extra_vars:
      azure_subscription_id: "{{ azure_subscription_id }}"
      aws_region: "{{ aws_region }}"
    labels:
      - "{{ demo_label_name }}"

  - name: Snapshot - Preview (dry run)
    organization: "{{ demo_organization_name }}"
    inventory: "{{ demo_inventory_name }}"
    project: "{{ demo_project_name }}"
    playbook: playbooks/demo/snapshot_preview.yml
    execution_environment: "{{ demo_execution_environment_name }}"
    credentials:
      - "{{ azure_credential_name }}"
      - "{{ aws_credential_name }}"
    ask_variables_on_launch: true
    extra_vars:
      azure_resource_group: "{{ azure_resource_group }}"
      azure_vm_hostname: "{{ azure_vm_hostname }}"
      aws_ec2_hostname: "{{ aws_ec2_hostname }}"
      aws_region: "{{ aws_region }}"
      snapshot_name_prefix: "{{ snapshot_name_prefix }}"
    labels:
      - "{{ demo_label_name }}"

  - name: Snapshot - Azure by hostname
    organization: "{{ demo_organization_name }}"
    inventory: "{{ demo_inventory_name }}"
    project: "{{ demo_project_name }}"
    playbook: playbooks/demo/snapshot_azure.yml
    execution_environment: "{{ demo_execution_environment_name }}"
    credentials:
      - "{{ azure_credential_name }}"
    ask_variables_on_launch: true
    extra_vars:
      target_hostname: "{{ azure_vm_hostname }}"
      azure_resource_group: "{{ azure_resource_group }}"
    labels:
      - "{{ demo_label_name }}"

  - name: Snapshot - AWS by hostname
    organization: "{{ demo_organization_name }}"
    inventory: "{{ demo_inventory_name }}"
    project: "{{ demo_project_name }}"
    playbook: playbooks/demo/snapshot_aws.yml
    execution_environment: "{{ demo_execution_environment_name }}"
    credentials:
      - "{{ aws_credential_name }}"
    ask_variables_on_launch: true
    extra_vars:
      target_hostname: "{{ aws_ec2_hostname }}"
      aws_region: "{{ aws_region }}"
    labels:
      - "{{ demo_label_name }}"

  - name: Snapshot - Verify
    organization: "{{ demo_organization_name }}"
    inventory: "{{ demo_inventory_name }}"
    project: "{{ demo_project_name }}"
    playbook: playbooks/demo/snapshot_verify.yml
    execution_environment: "{{ demo_execution_environment_name }}"
    credentials:
      - "{{ azure_credential_name }}"
      - "{{ aws_credential_name }}"
    ask_variables_on_launch: false
    extra_vars:
      azure_resource_group: "{{ azure_resource_group }}"
      aws_region: "{{ aws_region }}"
      snapshot_name_prefix: "{{ snapshot_name_prefix }}"
    labels:
      - "{{ demo_label_name }}"

  - name: Snapshot - Cleanup preview (dry run)
    organization: "{{ demo_organization_name }}"
    inventory: "{{ demo_inventory_name }}"
    project: "{{ demo_project_name }}"
    playbook: playbooks/demo/snapshot_cleanup_preview.yml
    execution_environment: "{{ demo_execution_environment_name }}"
    credentials:
      - "{{ azure_credential_name }}"
      - "{{ aws_credential_name }}"
    ask_variables_on_launch: true
    extra_vars:
      azure_resource_group: "{{ azure_resource_group }}"
      aws_region: "{{ aws_region }}"
      enable_snapshot_cleanup: "{{ enable_snapshot_cleanup | default(false) }}"
      snapshot_cleanup_mode: "{{ snapshot_cleanup_mode | default('time') }}"
      snapshot_retention_days: "{{ snapshot_retention_days }}"
      snapshot_retention_count: "{{ snapshot_retention_count | default(1) }}"
      snapshot_name_prefix: "{{ snapshot_name_prefix }}"
    labels:
      - "{{ demo_label_name }}"

  - name: Snapshot - Cleanup (optional)
    organization: "{{ demo_organization_name }}"
    inventory: "{{ demo_inventory_name }}"
    project: "{{ demo_project_name }}"
    playbook: playbooks/demo/snapshot_cleanup.yml
    execution_environment: "{{ demo_execution_environment_name }}"
    credentials:
      - "{{ azure_credential_name }}"
      - "{{ aws_credential_name }}"
    ask_variables_on_launch: true
    extra_vars:
      azure_resource_group: "{{ azure_resource_group }}"
      aws_region: "{{ aws_region }}"
      enable_snapshot_cleanup: "{{ enable_snapshot_cleanup | default(false) }}"
      # snapshot_cleanup_mode: 'time' (default) or 'count'.
      # Pass -e snapshot_cleanup_mode=count at launch to switch to count-based retention.
      snapshot_cleanup_mode: "{{ snapshot_cleanup_mode | default('time') }}"
      snapshot_retention_days: "{{ snapshot_retention_days }}"
      snapshot_retention_count: "{{ snapshot_retention_count | default(1) }}"
      snapshot_name_prefix: "{{ snapshot_name_prefix }}"
    labels:
      - "{{ demo_label_name }}"

  - name: Snapshot - Inventory report
    organization: "{{ demo_organization_name }}"
    inventory: "{{ demo_inventory_name }}"
    project: "{{ demo_project_name }}"
    playbook: playbooks/demo/snapshot_inventory.yml
    execution_environment: "{{ demo_execution_environment_name }}"
    credentials:
      - "{{ azure_credential_name }}"
      - "{{ aws_credential_name }}"
    ask_variables_on_launch: true
    extra_vars:
      azure_resource_group: "{{ azure_resource_group }}"
      aws_region: "{{ aws_region }}"
    labels:
      - "{{ demo_label_name }}"
